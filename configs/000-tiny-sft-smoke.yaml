# @package _global_
defaults:
  - main
  - model: smollm2_135m
  - data: tiny_synthetic
  - trainer: trl_sft
  - tracking: none
  - compute: local
  - budget: default
  - _self_

experiment_name: 000-tiny-sft-smoke

trainer:
  planned_tokens: 5000
  args:
    max_steps: 10
    per_device_train_batch_size: 8
    gradient_accumulation_steps: 1
    learning_rate: 5.0e-5
    save_strategy: "no"
    use_cpu: true
