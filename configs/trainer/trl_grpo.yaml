kind: trl_grpo
planned_tokens: null
peft: null
# Dotted import paths ('package.module:function') resolved via importlib at run time;
# each callable must tolerate malformed completions (return the floor reward, never raise).
reward_funcs: []
args:
  _target_: trl.GRPOConfig
  output_dir: ${experiment_dir}/ckpts
  max_steps: -1
  num_train_epochs: 1
  num_generations: 4
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  max_completion_length: 256
  learning_rate: 1.0e-6
  beta: 0.0
  lr_scheduler_type: linear # any transformers SchedulerType; `constant` is common for RL
  lr_scheduler_kwargs: null
  logging_steps: 1
  eval_strategy: "no"
  save_steps: 200
  bf16: false
  seed: ${seed}
