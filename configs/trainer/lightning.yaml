kind: lightning
module: null # _target_ node: your LightningModule
datamodule: null # _target_ node: your LightningDataModule
planned_tokens: null
# args is a lightning.pytorch.Trainer instantiate node; the adapter injects
# logger/callbacks/enable_progress_bar and the smoke overrides.
args:
  _target_: lightning.pytorch.Trainer
  max_steps: 1000
  accelerator: auto
  devices: auto
  precision: 32-true
  log_every_n_steps: 1
  val_check_interval: 50
  gradient_clip_val: 1.0
  default_root_dir: ${experiment_dir}/ckpts
