kind: trl_sft
planned_tokens: null
peft: null
# args is a trl.SFTConfig instantiate node; training.trl.build_args resolves it and
# layers on the runtime values it owns (report_to, run_name, bf16, smoke overrides).
args:
  _target_: trl.SFTConfig
  output_dir: ${experiment_dir}/ckpts
  max_steps: -1
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  # LR schedule: any transformers SchedulerType (linear, cosine, cosine_with_restarts,
  # cosine_with_min_lr, polynomial, constant, constant_with_warmup, wsd, ...).
  lr_scheduler_type: cosine
  # Scheduler-specific kwargs (null = none). Examples:
  #   cosine_with_restarts -> {num_cycles: 2}
  #   cosine_with_min_lr   -> {min_lr_rate: 0.1}
  lr_scheduler_kwargs: null
  warmup_ratio: 0.03
  logging_steps: 1
  eval_strategy: "no"
  save_steps: 200
  bf16: false
  seed: ${seed}
