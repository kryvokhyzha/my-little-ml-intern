# @package _global_
# SELF-distillation (STaR/RFT): SmolLM2-360M-Instruct fine-tunes on its OWN
# verifier-accepted rollouts (collected by prep-self-distill.py). Same model
# generates and trains — no external teacher, unlike 002 (off-policy imitation)
# and 003 (on-policy GKD). Success metric: held-out eval-task success rate
# (prep-self-distill.py eval_model_path=<ckpt>), not the loss.
defaults:
  - main
  - model: smollm2_360m_it
  - data: self_distill_local
  - trainer: trl_sft
  - tracking: trackio
  - compute: ssh # remote-first: local Mac is resource-constrained (smokes stay local)
  - budget: sft # 360M is over the default profile's 200M ceiling
  - _self_

experiment_name: 004-self-distill

trainer:
  planned_tokens: 100000 # estimate — tune from num_input_tokens_seen after run 1
  args:
    max_steps: 100
    per_device_train_batch_size: 8
    gradient_accumulation_steps: 2
    learning_rate: 2.0e-5
    max_length: 256
    completion_only_loss: true
    eval_strategy: steps
    eval_steps: 25
    save_strategy: steps
    save_steps: 50
    logging_steps: 5
