name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"
      - run: uv sync --frozen --only-group lint --no-install-project
      - run: uv run --no-sync ruff check .
      - run: uv run --no-sync ruff format --check .

  # torch on ubuntu is multi-GB; the uv cache makes reruns cheap.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen --all-extras --no-install-project
      - run: uv run --no-sync pytest -q
